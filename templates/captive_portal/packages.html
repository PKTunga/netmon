{% extends 'captive_portal/base.html' %}

{% block content %}
<div class="max-w-5xl w-full mx-auto px-4">
    <div class="flex flex-col md:flex-row justify-between items-center mb-10 text-white">
        <div>
            <h2 class="text-3xl font-bold">Choose a Plan 🛒</h2>
            <p class="text-slate-400">Select the best speed for you</p>
        </div>
        <div class="mt-4 md:mt-0 bg-white/10 px-4 py-2 rounded-full border border-white/20">
            <span class="text-sm">👤 {{ request.user.username }}</span>
        </div>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
        {% for package in packages %}
        <div class="bg-white rounded-3xl p-8 text-center shadow-xl hover:shadow-orange-500/20 transition-all border-b-8 border-orange-500">
            <h3 class="text-xl font-bold text-slate-800 uppercase">{{ package.name }}</h3>
            <p class="text-slate-500 text-sm mt-2">{{ package.description }}</p>
            <div class="my-6">
                <span class="text-4xl font-black text-slate-900">KES {{ package.price }}</span>
            </div>
            
            <button hx-post="{% url 'initiate_payment' package.id %}" 
                hx-swap="outerHTML" 
                hx-indicator="#spinner-{{ package.id }}"
                class="w-full bg-slate-900 text-white font-bold py-4 rounded-2xl flex items-center justify-center gap-2 hover:bg-orange-600 transition-colors">
                <span>Pay with M-Pesa 💸</span>
                <div id="spinner-{{ package.id }}" class="htmx-indicator animate-spin h-5 w-5 border-2 border-white border-t-transparent rounded-full"></div>
            </button>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
