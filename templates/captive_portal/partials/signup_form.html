<form hx-post="{% url 'captive_signup' %}" hx-swap="outerHTML" class="row g-3">
    {% csrf_token %}

    <div class="col-12 text-center">
        <h4 class="mt-3 fw-bold">Sign Up</h4>
        <p class="text-muted">Create a new account</p>
    </div>

    {% if error %}
    <div class="col-12">
        <div class="alert alert-danger p-2">{{ error }}</div>
    </div>
    {% endif %}

    <div class="col-12">
        <label for="phone" class="form-label">Phone Number</label>
        <div class="input-group">
            <span class="input-group-text bg-transparent"><i class='bx bx-phone'></i></span>
            <input type="text" class="form-control border-start-0" id="phone" name="phone" value="{{ phone|default:'' }}" required placeholder="e.g. 2547...">
        </div>
    </div>
    <div class="col-12">
        <label for="password" class="form-label">Password</label>
        <div class="input-group" id="show_hide_password_signup">
            <span class="input-group-text bg-transparent"><i class='bx bx-lock-alt'></i></span>
            <input type="password" class="form-control border-start-0" id="password" name="password" required placeholder="Enter Password">
            <a href="javascript:;" class="input-group-text bg-transparent"><i class='bx bx-hide'></i></a>
        </div>
    </div>
    <div class="col-12">
        <label for="confirm_password" class="form-label">Confirm Password</label>
        <div class="input-group" id="show_hide_confirm_password">
            <span class="input-group-text bg-transparent"><i class='bx bx-lock-alt'></i></span>
            <input type="password" class="form-control border-start-0" id="confirm_password" name="confirm_password" required placeholder="Confirm Password">
            <a href="javascript:;" class="input-group-text bg-transparent"><i class='bx bx-hide'></i></a>
        </div>
    </div>
    <div class="col-12">
        <div class="d-grid">
            <button type="submit" class="btn btn-primary"><i class="bx bxs-user-plus"></i>SIGN UP</button>
        </div>
    </div>
    <div class="col-12 text-center">
         <p>Already have an account? <a href="#" hx-get="{% url 'captive_login' %}" hx-target="closest form" hx-swap="outerHTML">Sign in here</a></p>
    </div>
</form>
<script>
(function() {
    var form = document.currentScript.previousElementSibling;
    if (!form) return;
    
    function setupToggle(id) {
        var container = form.querySelector('#' + id);
        if (!container) return;
        var toggle = container.querySelector('a');
        var input = container.querySelector('input');
        var icon = container.querySelector('a i');
        
        if (toggle && input && icon) {
            toggle.addEventListener('click', function (event) {
                event.preventDefault();
                if (input.getAttribute("type") === "text") {
                    input.setAttribute('type', 'password');
                    icon.classList.remove("bx-show");
                    icon.classList.add("bx-hide");
                } else if (input.getAttribute("type") === "password") {
                    input.setAttribute('type', 'text');
                    icon.classList.remove("bx-hide");
                    icon.classList.add("bx-show");
                }
            });
        }
    }
    setupToggle('show_hide_password_signup');
    setupToggle('show_hide_confirm_password');
})();
</script>
