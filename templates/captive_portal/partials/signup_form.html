<form hx-post="{% url 'captive_signup' %}" hx-swap="outerHTML" class="space-y-4">
    {% csrf_token %}

    <div class="text-center">
        <h2 class="text-2xl font-bold text-slate-800">Join Us! ✨</h2>
        <p class="text-slate-500 text-sm">Create your WiFi account</p>
    </div>

    {% if error %}
    <div class="bg-red-50 text-red-600 p-3 rounded-lg text-sm border border-red-100">
        ❌ {{ error }}
    </div>
    {% endif %}

    <div>
        <label class="block text-sm font-semibold text-slate-700">Phone Number 📱</label>
        <input type="text" name="phone" required class="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="2547...">
    </div>

    <div>
        <label class="block text-sm font-semibold text-slate-700">Password 🔒</label>
        <input type="password" name="password" required class="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="Min 6 characters">
    </div>

    <div>
        <label class="block text-sm font-semibold text-slate-700">Confirm Password ✅</label>
        <input type="password" name="confirm_password" required class="w-full px-4 py-2 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 outline-none" placeholder="Repeat password">
    </div>

    <button type="submit" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl shadow-lg mt-2 transition-all">
        REGISTER & CONNECT ⚡
    </button>

    <div class="text-center text-sm pt-2">
        <p class="text-slate-500">Already a member? 
            <a href="#" hx-get="{% url 'captive_login' %}" hx-target="closest form" hx-swap="outerHTML" class="text-orange-600 font-bold hover:underline">
                Sign In 🚪
            </a>
        </p>
    </div>
</form>
