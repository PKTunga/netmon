<form hx-post="{% url 'captive_login' %}" hx-swap="outerHTML" class="row g-3">
    {% csrf_token %}

    <div class="col-12 text-center">
        <h4 class="mt-3 fw-bold">Welcome Back!</h4>
        <p class="text-muted">Login to your account</p>
    </div>

    {% if error %}
    <div class="col-12">
        <div class="alert alert-danger p-2">{{ error }}</div>
    </div>
    {% endif %}

    <div class="col-12">
        <label for="phone" class="form-label">Phone Number</label>
        <div class="input-group">
            <span class="input-group-text bg-transparent"><i class='bx bx-phone'></i></span>
            <input type="text" class="form-control border-start-0" id="phone" name="phone" value="{{ phone|default:'' }}" required placeholder="e.g. 2547...">
        </div>
    </div>
    <div class="col-12">
        <label for="password" class="form-label">Password</label>
        <div class="input-group" id="show_hide_password">
            <span class="input-group-text bg-transparent"><i class='bx bx-lock-alt'></i></span>
            <input type="password" class="form-control border-start-0" id="password" name="password" required placeholder="Enter Password">
            <a href="javascript:;" class="input-group-text bg-transparent"><i class='bx bx-hide'></i></a>
        </div>
    </div>
    <div class="col-12 text-end">
        {# TODO: Update with correct URL for password reset #}
        <a href="#">Forgot Password ?</a>
    </div>
    <div class="col-12">
        <div class="d-grid">
            <button type="submit" class="btn btn-primary"><i class="bx bxs-lock-open"></i>SIGN IN</button>
        </div>
    </div>
    <div class="col-12 text-center">
         <p>Don't have an account? <a href="#" hx-get="{% url 'captive_signup' %}" hx-target="closest form" hx-swap="outerHTML">Sign up here</a></p>
    </div>
</form>
<script>
(function() {
    var form = document.currentScript.previousElementSibling;
    if (!form) return;
    var toggle = form.querySelector('#show_hide_password a');
    if (toggle) {
        toggle.addEventListener('click', function (event) {
            event.preventDefault();
            var passwordInput = form.querySelector('#show_hide_password input');
            var passwordIcon = form.querySelector('#show_hide_password a i');
            if (passwordInput.getAttribute("type") === "text") {
                passwordInput.setAttribute('type', 'password');
                passwordIcon.classList.remove("bx-show");
                passwordIcon.classList.add("bx-hide");
            } else if (passwordInput.getAttribute("type") === "password") {
                passwordInput.setAttribute('type', 'text');
                passwordIcon.classList.remove("bx-hide");
                passwordIcon.classList.add("bx-show");
            }
        });
    }
})();
</script>
