<form hx-post="{% url 'captive_login' %}" hx-swap="outerHTML" class="space-y-5">
    {% csrf_token %}

    <div class="text-center">
        <h2 class="text-2xl font-bold text-slate-800">Welcome Back! 👋</h2>
    </div>

    {% if error %}
    <div class="bg-red-50 text-red-600 p-3 rounded-lg text-sm border border-red-100">
        ⚠️ {{ error }}
    </div>
    {% endif %}

    <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Phone Number 📱</label>
        <input type="text" name="phone" value="{{ phone|default:'' }}" required 
            class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 outline-none transition-all"
            placeholder="2547...">
    </div>

    <div>
        <label class="block text-sm font-semibold text-slate-700 mb-1">Password 🔒</label>
        <div class="relative" id="show_hide_password">
            <input type="password" name="password" required 
                class="w-full px-4 py-3 rounded-xl border border-slate-200 focus:ring-2 focus:ring-orange-500 outline-none transition-all"
                placeholder="••••••••">
            <button type="button" class="absolute right-3 top-3 text-slate-400">
                <i class='bx bx-hide text-xl'></i>
            </button>
        </div>
    </div>

    <button type="submit" class="w-full bg-orange-500 hover:bg-orange-600 text-white font-bold py-3 rounded-xl shadow-lg transition-transform active:scale-95">
        SIGN IN 🔓
    </button>

    <div class="text-center text-sm">
        <p class="text-slate-500">New here? 
            <a href="#" hx-get="{% url 'captive_signup' %}" hx-target="closest form" hx-swap="outerHTML" class="text-orange-600 font-bold hover:underline">
                Create Account ✨
            </a>
        </p>
    </div>
</form>

<script>
(function() {
    const parent = document.currentScript.previousElementSibling;
    const btn = parent.querySelector('#show_hide_password button');
    const input = parent.querySelector('input[type="password"]');
    if (btn) {
        btn.addEventListener('click', () => {
            const isPass = input.type === 'password';
            input.type = isPass ? 'text' : 'password';
            btn.innerHTML = isPass ? "<i class='bx bx-show text-xl'></i>" : "<i class='bx bx-hide text-xl'></i>";
        });
    }
})();
</script>
